<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producción - MARTIN Company</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="sidebar">
        <img src="img/LOGO.jpeg" class="logo">
        <h2>MARTIN Company</h2>
        <ul></ul>
    </div>
    <div class="contenido">
        <h1>Producción</h1>
        <p class="subtitulo">Corte → Maquila → Avance → Control de calidad</p>

        <div class="formulario">
            <h3>⚠️ Alertas de retraso</h3>
            <table>
                <thead><tr><th>Tipo</th><th>Mensaje</th><th>Fecha</th></tr></thead>
                <tbody id="tablaAlertas"></tbody>
            </table>
        </div>

        <h2>Órdenes de Producción</h2>
        <table>
            <thead>
                <tr><th>Pedido</th><th>Maquiladora</th><th>Estado</th><th>Avance</th><th>Fin planeada</th><th>Tiempo</th><th>Acciones</th></tr>
            </thead>
            <tbody id="tablaOrdenes"></tbody>
        </table>
    </div>

    <div id="modalAvance" class="modal-overlay" style="display:none;">
        <div class="formulario modal-box">
            <h3>Registrar Avance de Producción</h3>
            <input type="hidden" id="avanceOrdenId">
            <label>Porcentaje de avance (0-100):</label>
            <input type="number" id="avancePct" min="0" max="100">
            <label>Descripción:</label>
            <input type="text" id="avanceDesc" placeholder="Ej: Confección completada">
            <br><br>
            <button onclick="guardarAvance()">Guardar avance</button>
            <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js?v=4"></script>
    <script src="js/supabase-client.js?v=4"></script>
    <script src="js/catalogos.js?v=4"></script>
    <script src="js/produccion.js?v=4"></script>
</body>
</html>
