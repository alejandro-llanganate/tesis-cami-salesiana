<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calidad - MARTIN Company</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css?v=8">
</head>
<body class="app-body">
    <div class="app-shell">
        <aside id="appSidebar" class="app-sidebar"></aside>
        <main class="app-main">
            <div class="mb-4">
                <h1 class="h3 text-primary fw-bold mb-1">Control de Calidad</h1>
                <p class="text-secondary mb-0">10 parámetros — al aprobar se suma al stock terminado</p>
            </div>

            <div class="card section-card mb-4">
                <div class="card-body">
                    <h2 class="h5 mb-3">Órdenes pendientes de inspección</h2>
                    <div class="table-panel">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead><tr><th>Pedido</th><th>Maquiladora</th><th>Avance</th><th>Acción</th></tr></thead>
                                <tbody id="tablaOrdenesCalidad"></tbody>
                            </table>
                        </div>
                        <div id="pagCalidad"></div>
                    </div>
                </div>
            </div>

            <section id="seccionInspeccion" class="card section-card d-none">
                <div class="card-body">
                    <input type="hidden" id="inspOrdenId">
                    <h2 class="h5 mb-3">Inspección de calidad</h2>
                    <div id="criteriosLista"></div>
                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-success" type="button" onclick="guardarInspeccion()">Finalizar inspección</button>
                        <button class="btn btn-outline-secondary" type="button" onclick="document.getElementById('seccionInspeccion').classList.add('d-none')">Cancelar</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js?v=8"></script>
    <script src="js/mock-data.js?v=8"></script>
    <script src="js/supabase-client.js?v=8"></script>
    <script src="js/ui.js?v=8"></script>
    <script src="js/catalogos.js?v=8"></script>
    <script src="js/calidad.js?v=8"></script>
</body>
</html>
