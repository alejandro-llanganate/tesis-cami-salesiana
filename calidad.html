<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calidad - MARTIN Company</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="sidebar"><ul></ul></div>
    <div class="contenido">
        <div class="page-header">
            <div>
                <h1>Control de Calidad</h1>
                <p class="subtitulo">10 parámetros — al aprobar se suma al stock terminado</p>
            </div>
        </div>

        <section class="bloque-seccion">
            <h2>Órdenes pendientes de inspección</h2>
            <div class="tabla-wrap">
                <table>
                    <thead><tr><th>Pedido</th><th>Maquiladora</th><th>Avance</th><th>Acción</th></tr></thead>
                    <tbody id="tablaOrdenesCalidad"></tbody>
                </table>
                <div id="pagCalidad"></div>
            </div>
        </section>

        <section id="seccionInspeccion" class="bloque-seccion" style="display:none;">
            <input type="hidden" id="inspOrdenId">
            <h2>Inspección de calidad</h2>
            <div id="criteriosLista"></div>
            <br>
            <button class="btn-exito" type="button" onclick="guardarInspeccion()">Finalizar inspección</button>
            <button class="btn-cancelar" type="button" onclick="document.getElementById('seccionInspeccion').style.display='none'">Cancelar</button>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js?v=6"></script>
    <script src="js/mock-data.js?v=6"></script>
    <script src="js/supabase-client.js?v=6"></script>
    <script src="js/ui.js?v=6"></script>
    <script src="js/catalogos.js?v=6"></script>
    <script src="js/calidad.js?v=6"></script>
</body>
</html>
