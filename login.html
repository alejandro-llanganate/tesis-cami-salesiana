<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MARTIN Company</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css?v=8">
</head>
<body>
    <div class="login-page">
        <div class="card login-card">
            <div class="card-body p-4 p-md-5 text-center">
                <img src="img/LOGO.jpeg" class="logo mb-3" alt="Logo MARTIN">
                <h1 class="h4 text-primary fw-bold mb-1">MARTIN Company</h1>
                <p class="text-secondary small mb-4">Sistema de Gestión de Producción</p>

                <form id="formLogin" class="text-start" autocomplete="on">
                    <div class="mb-3">
                        <label class="form-label" for="loginEmail">Correo electrónico</label>
                        <input type="email" class="form-control" id="loginEmail" placeholder="correo@martin.com" required autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="loginPassword">Contraseña</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
                            <button class="btn btn-outline-secondary" type="button" id="btnTogglePass" aria-label="Mostrar contraseña">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar sesión
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js?v=8"></script>
    <script src="js/mock-data.js?v=8"></script>
    <script src="js/supabase-client.js?v=8"></script>
    <script src="js/ui.js?v=8"></script>
    <script>
        document.getElementById("btnTogglePass").addEventListener("click", function () {
            var input = document.getElementById("loginPassword");
            var icon = this.querySelector("i");
            if (input.type === "password") {
                input.type = "text";
                icon.className = "bi bi-eye-slash";
            } else {
                input.type = "password";
                icon.className = "bi bi-eye";
            }
        });

        document.getElementById("formLogin").addEventListener("submit", async function (e) {
            e.preventDefault();
            var email = document.getElementById("loginEmail").value.trim();
            var password = document.getElementById("loginPassword").value;
            if (!email || !password) {
                mostrarAviso("Ingrese correo y contraseña");
                return;
            }
            var user = await autenticarUsuario(email, password);
            if (!user) {
                mostrarError("Correo o contraseña incorrectos");
                return;
            }
            sessionStorage.setItem("martin_sesion", JSON.stringify(user));
            mostrarExito("Bienvenida/o, " + user.nombre);
            setTimeout(function () {
                window.location.href = user.rol === "maquiladora" ? "produccion.html" : "index.html";
            }, 700);
        });
    </script>
</body>
</html>
