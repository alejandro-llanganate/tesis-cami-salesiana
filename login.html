<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MARTIN Company</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css?v=7">
</head>
<body>
    <div class="login-page">
        <div class="card login-card">
            <div class="card-body p-4 p-md-5 text-center">
                <img src="img/LOGO.jpeg" class="logo mb-3" alt="Logo MARTIN">
                <h1 class="h4 text-primary fw-bold mb-1">MARTIN Company</h1>
                <p class="text-secondary small mb-3">Sistema de Gestión de Producción</p>
                <span id="badgeMock" class="badge text-bg-info mb-3 d-none">Modo demo · datos de prueba</span>

                <div class="text-start mb-3">
                    <label class="form-label" for="perfilSelect">Seleccione su perfil</label>
                    <select id="perfilSelect" class="form-select">
                        <option value="">-- Seleccione --</option>
                    </select>
                </div>
                <button class="btn btn-primary w-100" type="button" onclick="iniciarSesion()">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar al sistema
                </button>

                <div class="text-start mt-4 pt-3 border-top" id="loginDemo">
                    <p class="small text-uppercase text-primary fw-semibold mb-2">Datos de prueba</p>
                    <ul class="list-group list-group-flush mb-3" id="loginDemoLista"></ul>
                    <p class="small text-secondary mb-2">
                        Flujo mock: <strong>PED-001</strong> completado ·
                        <strong>PED-003</strong> compra ·
                        <strong>PED-004</strong> OP ·
                        <strong>PED-005</strong> calidad ·
                        <strong>PED-006</strong> entregar ·
                        <strong>PED-007</strong> retraso
                    </p>
                    <button type="button" class="btn btn-outline-secondary btn-sm d-none" id="btnResetMock" onclick="resetMockData()">
                        Restaurar datos de prueba
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js?v=7"></script>
    <script src="js/mock-data.js?v=7"></script>
    <script src="js/supabase-client.js?v=7"></script>
    <script src="js/ui.js?v=7"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async function () {
            if (window.USE_MOCK_DATA) {
                document.getElementById("badgeMock").classList.remove("d-none");
                document.getElementById("btnResetMock").classList.remove("d-none");
            }
            var perfiles = await obtenerPerfiles();
            var select = document.getElementById("perfilSelect");
            var lista = document.getElementById("loginDemoLista");
            if (!perfiles.length) {
                lista.innerHTML = '<li class="list-group-item small">No hay perfiles. Activa USE_MOCK_DATA o configura Supabase.</li>';
                return;
            }
            perfiles.forEach(function (p) {
                var rolTxt = p.rol === "supervisora" ? "Supervisora" : "Maquiladora";
                var opt = document.createElement("option");
                opt.value = JSON.stringify({ id: p.id, nombre: p.nombre, rol: p.rol, email: p.email });
                opt.textContent = p.nombre + " (" + rolTxt + ")";
                select.appendChild(opt);
                var li = document.createElement("li");
                li.className = "list-group-item px-0 py-2";
                li.innerHTML = "<strong>" + p.nombre + "</strong><br><span class='small text-secondary'>" + p.email + " · " + rolTxt + "</span>";
                lista.appendChild(li);
            });
        });
        function iniciarSesion() {
            var val = document.getElementById("perfilSelect").value;
            if (!val) { mostrarAviso("Seleccione un perfil"); return; }
            sessionStorage.setItem("martin_sesion", val);
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
